<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Dungeon Blitz</title>
  <script src="js/swfobject.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #484955;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-container {
      width: min(100vw, 150vh);
      height: min(100vh, 66.6667vw);
      aspect-ratio: 3 / 2;
      flex: 0 0 auto;
      background: #484955;
    }

    #DungeonBlitz,
    object#DungeonBlitz,
    embed#DungeonBlitz {
      display: block;
      width: 100% !important;
      height: 100% !important;
      margin: 0;
      border: 0;
    }

    #flash-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3A3A45;
      font-family: sans-serif;
      text-align: center;
      pointer-events: none;
    }

    #fallback {
      display: none;
      color: #ccc;
      font-family: sans-serif;
      text-align: center;
      padding-top: 20vh;
    }

    a { color: #6cf; }
  </style>
</head>

<body>

  <div id="game-container"></div>

  <div id="flash-hint">
    <div>
      <p>Waiting for Adobe Flash Player…</p>
      <p style="font-size:0.9em; opacity:0.7">
        Click “Allow” in your browser’s address bar
      </p>
    </div>
  </div>

  <!-- Hard fallback if Flash is missing -->
  <div id="fallback">
    <h2>Adobe Flash Player Required</h2>
    <p>
      Enable Flash for this site when prompted,<br>
      or use the Flash Projector.
    </p>
    <p>
      • <a href="https://www.adobe.com/support/flashplayer/debug_downloads.html">
        Flash Projector (recommended)
      </a>
    </p>
  </div>

  <script>
    function normalizeGameLanguage(value) {
      const normalized = String(value || "").trim().toLowerCase();
      if (normalized === "br" || normalized === "pt" || normalized === "ptbr" || normalized === "pt-br") {
        return "pt-br";
      }
      return normalized === "en" || normalized === "tr" ? normalized : "";
    }

    function normalizeGameGender(value) {
      const normalized = String(value || "").trim().toLowerCase();
      return normalized === "male" || normalized === "female" ? normalized : "";
    }

    function readCookie(name) {
      const prefix = `${name}=`;
      for (const entry of document.cookie.split(";")) {
        const trimmed = entry.trim();
        if (trimmed.startsWith(prefix)) {
          return decodeURIComponent(trimmed.slice(prefix.length));
        }
      }
      return "";
    }

    const urlLanguage = normalizeGameLanguage(new URLSearchParams(window.location.search).get("lang"));
    if (urlLanguage) {
      document.cookie = `db_lang=${urlLanguage}; path=/; max-age=31536000; SameSite=Lax`;
    }

    const urlGender = normalizeGameGender(new URLSearchParams(window.location.search).get("gender"));
    if (urlGender) {
      document.cookie = `db_gender=${urlGender}; path=/; max-age=31536000; SameSite=Lax`;
    }

    const selectedLanguage = urlLanguage || normalizeGameLanguage(readCookie("db_lang"));
    const selectedGender = urlGender || normalizeGameGender(readCookie("db_gender"));
    const languageParam = selectedLanguage ? `&lang=${selectedLanguage}` : "";
    const genderParam = selectedLanguage === "pt-br" && selectedGender ? `&gender=${selectedGender}` : "";
    const swfUrl = `p/cbp/DungeonBlitz.swf?fv=cdl&gv=cdl${languageParam}${genderParam}`;
    console.log("[DungeonBlitzHost] Loading SWF", swfUrl);
    const localBridgeBaseUrl = "http://127.0.0.1:47631";
    const selfPresenceUrl = "/api/presence/self";
    const discordJoinUrl = "/api/presence/discord-join";
    const presencePollMs = 4000;
    const localDiscordBridgeEnabled =
      window.location.protocol === "http:" || window.location.protocol === "https:";
    let lastPresenceHash = "";

    function showFallback() {
      document.getElementById("flash-hint").style.display = "none";
      document.getElementById("fallback").style.display = "block";
    }

    function hideHint() {
      const hint = document.getElementById("flash-hint");
      if (hint) hint.style.display = "none";
    }

    async function postToLocalBridge(path, body) {
      try {
        await fetch(`${localBridgeBaseUrl}${path}`, {
          method: "POST",
          mode: "cors",
          cache: "no-store",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          keepalive: true
        });
      } catch (_error) {
        // Local bridge is optional; ignore when it is not running.
      }
    }

    async function syncDiscordPresence() {
      if (!localDiscordBridgeEnabled) {
        return;
      }

      try {
        const response = await fetch(selfPresenceUrl, {
          cache: "no-store",
          credentials: "same-origin"
        });

        if (!response.ok) {
          if (lastPresenceHash) {
            lastPresenceHash = "";
            await postToLocalBridge("/clear", { clear: true });
          }
          return;
        }

        const payload = await response.json();
        const session = payload && payload.session ? payload.session : null;
        if (!session) {
          if (lastPresenceHash) {
            lastPresenceHash = "";
            await postToLocalBridge("/clear", { clear: true });
          }
          return;
        }

        const sessionGender = normalizeGameGender(session.characterGender);
        const storedGender = normalizeGameGender(readCookie("db_gender"));
        if (selectedLanguage === "pt-br" && sessionGender && sessionGender !== storedGender) {
          document.cookie = `db_gender=${sessionGender}; path=/; max-age=31536000; SameSite=Lax`;
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set("lang", "pt-br");
          nextUrl.searchParams.set("gender", sessionGender);
          window.location.replace(nextUrl.toString());
          return;
        }

        const bridgePayload = {
          characterName: session.characterName,
          details: session.details,
          state: session.state,
          startedAtMs: session.startedAtMs,
          partySize: session.partySize,
          partyId: session.partyId,
          partyMax: session.partyMax,
          partyLocked: session.partyLocked,
          joinSecret: session.joinSecret,
          levelKey: session.levelKey,
          activityKind: session.activityKind,
          presenceUrl: new URL(selfPresenceUrl, window.location.origin).toString(),
          joinUrl: new URL(discordJoinUrl, window.location.origin).toString()
        };
        const nextHash = JSON.stringify(bridgePayload);
        if (nextHash === lastPresenceHash) {
          return;
        }

        lastPresenceHash = nextHash;
        await postToLocalBridge("/presence", bridgePayload);
      } catch (_error) {
        // Keep polling; game must continue even if presence sync fails.
      }
    }

    // Attempt native Flash immediately
    swfobject.embedSWF(
      swfUrl,
      "game-container",
      "100%",
      "100%",
      "10.0.0",
      null,
      { fv: "cdl", gv: "cdl" },
      { allowScriptAccess: "always", allowFullScreen: "true" },
      { id: "DungeonBlitz", name: "DungeonBlitz" },
      function (e) {
        if (!e.success) {
          // Flash not installed or unavailable
          showFallback();
        }
      }
    );

    // Give Flash time to initialize after permission
    setTimeout(hideHint, 2500);
    if (localDiscordBridgeEnabled) {
      setTimeout(syncDiscordPresence, 2500);
      setInterval(syncDiscordPresence, presencePollMs);
    }

    window.addEventListener("beforeunload", function () {
      if (!localDiscordBridgeEnabled || !lastPresenceHash) return;
      void postToLocalBridge("/clear", { clear: true });
    });
  </script>
</body>
</html>
